# Input Stream 1: Your mosaic-X5 (Rover)
inpstr1-type       =tcpcli
inpstr1-path       =192.168.86.55:13400
inpstr1-format     =sbf

# Input Stream 2: FLEPOS Base Station (NTRIP)
inpstr2-type       =ntripc
inpstr2-path       =157912a001:satnavam@gnss.vlaanderen.be:2101/FLEPOSVRS32GREC
inpstr2-format     =rtcm3
pos1-navsys        =45

# RTK Mode Settings
pos1-posmode      =kinematic    # Set to 'static' if the antenna isn't moving
pos1-frequency    =l1+l2+l5     # mosaic-X5 is triple-band
pos1-soltype      =forward

# CRITICAL: Tell RTKRCV to send your position to FLEPOS
inpstr2-nmeareq   =single       # Sends your GGA position to the caster

# Manually set a position near your actual location in Belgium
ant1-postype       =llh
ant1-pos1          =50.784768        # Approximate Lat
ant1-pos2          = 5.209092          # Approximate Lon
ant1-pos3          =70         # Approximate Height
